<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>N-Back</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui, sans-serif;
  background:#f4f6fb;
  color:#111;
  text-align:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container {
  width:100%;
  max-width:600px;
  padding:20px;
  box-sizing:border-box;
}

.hidden { display:none; }

h1 { font-size:18px; margin-bottom:20px; }

.settings input, .settings select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:18px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

.start { background:#111; color:#fff; }
.yes { background:#1a7f37; color:#fff; }
.no { background:#b42318; color:#fff; }

.letter {
  font-size:100px;
  font-weight:700;
  margin-top:60px;
  min-height:120px;
}

.progress {
  margin-top:30px;
  font-size:14px;
  color:#666;
}

.result {
  margin-top:40px;
}

.result h2 { margin-bottom:10px; }
.result p { margin:5px 0; }

</style>
</head>
<body>
<div class="container">

  <!-- AYAR EKRANI (sadece başlangıçta ve tekrar oyunda gösterilir) -->
  <div id="settingsScreen">
    <h1>N-Back (ANANNNNNNNNNNNNNNNNNNNNNN)</h1>
    <div class="settings">
      <input id="total" type="number" value="120" min="10" max="500" placeholder="Toplam soru">
      <input id="showMs" type="number" value="800" min="200" max="5000" placeholder="Gösterim süresi (ms)">
      <input id="gapMs" type="number" value="400" min="0" max="5000" placeholder="Aralık (ms)">
      <select id="alphabet">
        <option value="EN">A-Z</option>
        <option value="TR">A-Z + ÇĞİÖŞÜ</option>
      </select>
    </div>
    <button class="start" onclick="startGame()">Başlat</button>
  </div>

  <!-- OYUN EKRANI (sadece oyun sırasında gösterilir) -->
  <div id="gameScreen" class="hidden">
    <div class="letter" id="letter"></div>
    <button class="yes" onclick="answer(true)">EVET</button>
    <button class="no" onclick="answer(false)">HAYIR</button>
    <!-- İstersen bu progress satırını tamamen silebilirsin -->
    <div class="progress" id="progress"></div>
  </div>

  <!-- SONUÇ EKRANI (sadece oyun bittikten sonra gösterilir) -->
  <div id="resultScreen" class="hidden result">
    <h2>Oyun Bitti</h2>
    <p id="scoreText"></p>
    <p id="accuracyText"></p>
    <button class="start" onclick="resetGame()">Tekrar Oyna</button>
  </div>

</div>

<script>
const EN = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const TR = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("");

let state = {};

function startGame() {
  state = {
    total: parseInt(total.value),
    showMs: parseInt(showMs.value),
    gapMs: parseInt(gapMs.value),
    alphabet: alphabet.value === "TR" ? TR : EN,
    seq: [],
    idx: 0,
    correct: 0,
    wrong: 0,
    awaiting: false,
    running: true
  };

  settingsScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  nextLetter();
}

function nextLetter() {
  if (!state.running) return;

  if (state.idx >= state.total) {
    endGame();
    return;
  }

  state.nBack = state.idx < 40 ? 2 : 3;

  const letter = state.alphabet[Math.floor(Math.random()*state.alphabet.length)];
  state.seq.push(letter);
  state.idx++;
  state.awaiting = true;

  letterEl().textContent = letter;
  updateProgress();

  setTimeout(() => {
    letterEl().textContent = "";

    if (state.awaiting) {
      state.wrong++;
      state.awaiting = false;
    }

    setTimeout(nextLetter, state.gapMs);
  }, state.showMs);
}

function expectedMatch() {
  if (state.seq.length <= state.nBack) return false;
  return state.seq[state.seq.length-1] === state.seq[state.seq.length-1-state.nBack];
}

function answer(userMatch) {
  if (!state.awaiting) return;

  state.awaiting = false;

  if (userMatch === expectedMatch()) state.correct++;
  else state.wrong++;

  updateProgress();
}

function updateProgress() {
  progress.textContent = state.idx + " / " + state.total;
}

function endGame() {
  state.running = false;

  gameScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");

  const totalAnswered = state.correct + state.wrong;
  const acc = totalAnswered ? Math.round((state.correct / totalAnswered) * 100) : 0;

  scoreText.textContent = "Doğru: " + state.correct + " | Yanlış: " + state.wrong;
  accuracyText.textContent = "Doğruluk: %" + acc;
}

function resetGame() {
  resultScreen.classList.add("hidden");
  settingsScreen.classList.remove("hidden");
}

function letterEl() {
  return document.getElementById("letter");
}
</script>
</body>
</html>
