<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>N-Back</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui, sans-serif;
  background:#f4f6fb;
  color:#111;
  text-align:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container {
  width:100%;
  max-width:600px;
  padding:20px;
  box-sizing:border-box;
}

.hidden { display:none; }

h1 { font-size:18px; margin-bottom:20px; }

.settings input, .settings select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:18px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

.start { background:#111; color:#fff; }
.yes { background:#1a7f37; color:#fff; }
.no { background:#b42318; color:#fff; }

.letter {
  font-size:100px;
  font-weight:700;
  margin-top:60px;
  min-height:120px;
}

.progress {
  margin-top:30px;
  font-size:14px;
  color:#666;
}

.result {
  margin-top:40px;
}

.result h2 { margin-bottom:10px; }
.result p { margin:5px 0; }

</style>
</head>
<body>
<div class="container">

  <!-- AYAR EKRANI (sadece baĹźlangÄ±Ă§ta ve tekrar oyunda gĂ¶sterilir) -->
  <div id="settingsScreen">
    <h1>N-Back</h1>
    <div class="settings">
      <input id="total" type="number" value="80" min="10" max="500" placeholder="Toplam soru">
      <input id="showMs" type="number" value="1600" min="200" max="5000" placeholder="GĂ¶sterim sĂĽresi (ms)">
      <input id="gapMs" type="number" value="1200" min="0" max="5000" placeholder="AralÄ±k (ms)">
      <select id="alphabet">
        <option value="EN">A-Z</option>
        <option value="TR">A-Z + Ă‡ÄžÄ°Ă–ĹžĂś</option>
      </select>
    </div>
    <button class="start" onclick="startGame()">BaĹźlat</button>
  </div>

  <!-- OYUN EKRANI (sadece oyun sÄ±rasÄ±nda gĂ¶sterilir) -->
  <div id="gameScreen" class="hidden">
    <div class="letter" id="letter"></div>
    <button class="yes" onclick="answer(true)">EVET</button>
    <button class="no" onclick="answer(false)">HAYIR</button>
    <!-- Ä°stersen bu progress satÄ±rÄ±nÄ± tamamen silebilirsin -->
    <div class="progress" id="progress"></div>
  </div>

  <!-- SONUĂ‡ EKRANI (sadece oyun bittikten sonra gĂ¶sterilir) -->
  <div id="resultScreen" class="hidden result">
    <h2>Oyun Bitti</h2>
    <p id="scoreText"></p>
    <p id="accuracyText"></p>
    <button class="start" onclick="resetGame()">Tekrar Oyna</button>
  </div>

</div>

<script>
const EN = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const TR = "ABCĂ‡DEFGÄžHIÄ°JKLMNOĂ–PRSĹžTUĂśVYZ".split("");

// Hedef: yaklaĹźÄ±k %30 gerĂ§ek N-back eĹźleĹźmesi
const TARGET_MATCH_RATE = 0.3;

let state = {};

function startGame() {
  state = {
    total: parseInt(total.value),
    showMs: parseInt(showMs.value),
    gapMs: parseInt(gapMs.value),
    alphabet: alphabet.value === "TR" ? TR : EN,
    seq: [],
    idx: 0,
    correct: 0,
    wrong: 0,
    awaiting: false,
    running: true,
    showTimeoutId: null,
    gapTimeoutId: null
  };

  settingsScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  nextLetter();
}

// YardÄ±mcÄ±: rasgele harf
function randomLetter() {
  return state.alphabet[Math.floor(Math.random() * state.alphabet.length)];
}

// YardÄ±mcÄ±: bu elde gĂ¶sterilecek harfi ĂĽret
function generateLetter() {
  const nBack = state.nBack;
  const hasHistory = state.seq.length >= nBack;

  // Yeterli geĂ§miĹź varsa hedef orana gĂ¶re bu turu "eĹźleĹźme" mi yapalÄ±m?
  let forceMatch = false;
  if (hasHistory) {
    forceMatch = Math.random() < TARGET_MATCH_RATE;
  }

  if (forceMatch) {
    // N-back eĹźleĹźmesi: nBack Ă¶nceki harfi tekrar gĂ¶ster
    return state.seq[state.seq.length - nBack];
  } else {
    // EĹźleĹźme olmayan: nBack Ă¶nceki harften farklÄ± bir harf seĂ§
    if (!hasHistory) {
      return randomLetter();
    }
    const forbidden = state.seq[state.seq.length - nBack];
    let letter;
    do {
      letter = randomLetter();
    } while (letter === forbidden);
    return letter;
  }
}

function clearTimers() {
  if (state.showTimeoutId) {
    clearTimeout(state.showTimeoutId);
    state.showTimeoutId = null;
  }
  if (state.gapTimeoutId) {
    clearTimeout(state.gapTimeoutId);
    state.gapTimeoutId = null;
  }
}

// Bir sonraki harfi baĹźlat
function nextLetter() {
  if (!state.running) return;

  // Zaten tĂĽm sorular bittiyse bitir
  if (state.idx >= state.total) {
    endGame();
    return;
  }

  clearTimers();

  // Ä°lk 40 soru 2-back, sonrasÄ± 3-back
  state.nBack = state.idx < 40 ? 2 : 3;

  const letter = generateLetter();
  state.seq.push(letter);
  state.idx++;
  state.awaiting = true;

  letterEl().textContent = letter;
  updateProgress();

  // EÄźer kullanÄ±cÄ± hiĂ§ basmazsa, showMs sĂĽresi sonunda otomatik yanlÄ±Ĺź say
  state.showTimeoutId = setTimeout(() => {
    if (!state.awaiting) return; // kullanÄ±cÄ± zaten cevapladÄ±
    state.awaiting = false;
    state.wrong++;
    scheduleNext();
  }, state.showMs);
}

// Bir sonraki eldeye geĂ§iĹźi (gapMs bekleyerek veya direkt) ayarlar
function scheduleNext() {
  clearTimers();
  if (state.gapMs > 0) {
    state.gapTimeoutId = setTimeout(nextLetter, state.gapMs);
  } else {
    nextLetter();
  }
}

// Ĺžu anki elde gerĂ§ekten N-back eĹźleĹźmesi bekleniyor mu?
function expectedMatch() {
  const nBack = state.nBack;
  if (state.seq.length <= nBack) return false;
  return state.seq[state.seq.length - 1] === state.seq[state.seq.length - 1 - nBack];
}

// KullanÄ±cÄ± EVET/HAYIR bastÄ±ÄźÄ±nda
function answer(userMatch) {
  if (!state.awaiting || !state.running) return;

  state.awaiting = false;
  clearTimers();

  if (userMatch === expectedMatch()) {
    state.correct++;
  } else {
    state.wrong++;
  }

  updateProgress();
  // Ä°STEDÄ°ÄžÄ°N GÄ°BÄ°: cevap sonrasÄ± hemen bir sonraki harfe geĂ§
  scheduleNext();
}

function updateProgress() {
  progress.textContent = state.idx + " / " + state.total;
}

function endGame() {
  state.running = false;
  clearTimers();

  gameScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");

  const totalAnswered = state.correct + state.wrong;
  const acc = totalAnswered ? Math.round((state.correct / totalAnswered) * 100) : 0;

  scoreText.textContent = "DoÄźru: " + state.correct + " | YanlÄ±Ĺź: " + state.wrong;
  accuracyText.textContent = "DoÄźruluk: %" + acc;
}

function resetGame() {
  clearTimers();
  resultScreen.classList.add("hidden");
  settingsScreen.classList.remove("hidden");
}

function letterEl() {
  return document.getElementById("letter");
}
</script>
</body>
</html>
