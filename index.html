<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>City Quiz</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui, sans-serif;
  background:#f4f6fb;
  color:#111;
  text-align:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container {
  width:100%;
  max-width:980px;
  padding:20px;
  box-sizing:border-box;
}

.hidden { display:none; }

h1 { font-size:18px; margin-bottom:20px; }

.settings input, .settings select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:18px;
  width:auto;
  margin-top:10px;
  cursor:pointer;
}

.start { background:#111; color:#fff; width:100%; }
.yes { background:#1a7f37; color:#fff; }
.no { background:#b42318; color:#fff; }

.letter {
  font-size:100px;
  font-weight:700;
  margin-top:60px;
  min-height:120px;
}

.progress {
  margin-top:30px;
  font-size:14px;
  color:#666;
}

.result {
  margin-top:40px;
}

.result h2 { margin-bottom:10px; }
.result p { margin:5px 0; }

.prompt {
  margin-top: 6px;
  font-size: 16px;
  color: #222;
  min-height: 22px;
}

.cityGrid {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  max-height: 72vh;
  overflow-y: auto;
  padding-bottom: 6px;
}

.cityBtn {
  width: 100%;
  margin-top: 0;
  padding: 10px 6px;
  font-size: 13px;
  background: #ffffff;
  border: 1px solid #ddd;
  border-radius: 10px;
  cursor: pointer;
}

.cityBtn.correct {
  background:#1a7f37;
  border-color:#1a7f37;
  color:#fff;
}

.cityBtn.wrong {
  background:#b42318;
  border-color:#b42318;
  color:#fff;
}

</style>
</head>
<body>
<div class="container">

  <!-- AYAR EKRANI -->
  <div id="settingsScreen">
    <h1>City Quiz</h1>
    <div class="settings">
      <label style="display:flex; align-items:center; justify-content:flex-start; gap:10px; margin-bottom:12px;">
        <input id="useVoice" type="checkbox" checked />
        <span>Sesi kullan (Web Speech API)</span>
      </label>

      <select id="voiceSelect">
        <option value="auto">Otomatik ses</option>
      </select>

      <input id="speechRate" type="number" value="1.0" step="0.05" min="0.5" max="1.5" placeholder="Konuşma hızı (rate)">
      <input id="speechPitch" type="number" value="1.0" step="0.05" min="0.0" max="2.0" placeholder="Pitch">
      <input id="gapAfterAnswerMs" type="number" value="800" min="0" max="5000" placeholder="Bir sonraki soru aralığı (ms)">

      <label style="display:flex; align-items:center; justify-content:flex-start; gap:10px; margin-top:6px; margin-bottom:10px;">
        <input id="repeatOnWrong" type="checkbox" />
        <span>Yanlışta tekrar oku</span>
      </label>
    </div>
    <button class="start" onclick="startGame()">Başlat</button>
    <div class="progress" style="margin-top:12px; font-size:12px; color:#777;">
      Not: Bazı tarayıcılarda ses listesi ilk yüklemede hemen gelmeyebilir. Ses seçemiyorsan sayfayı yenile.
    </div>
  </div>

  <!-- OYUN EKRANI -->
  <div id="gameScreen" class="hidden">
    <div class="progress" id="progress"></div>
    <div class="prompt" id="prompt"></div>
    <div id="cityGrid" class="cityGrid"></div>
    <div class="progress" id="status"></div>
  </div>

  <!-- SONUÇ EKRANI -->
  <div id="resultScreen" class="hidden result">
    <h2>Oyun Bitti</h2>
    <p id="scoreText"></p>
    <p id="accuracyText"></p>
    <button class="start" onclick="resetGame()">Tekrar Oyna</button>
  </div>

</div>

<script>
// 65 şehir: görseldeki 13x5 grid'e göre, satır-satır (soldan sağa) okuma sırası.
const CITIES = [
  "Amsterdam", "Bishkek", "Houston", "Milan", "Singapore",
  "Ankara", "Bologna", "Kathmandu", "Montreal", "Stockholm",
  "Ashgabat", "Bombay", "Kiev", "Moscow", "Stuttgart",
  "Baghdad", "Boston", "Lagos", "Munich", "Sydney",
  "Bahrain", "Bremen", "Lisbon", "Paris", "Tashkent",
  "Baku", "Budapest", "London", "Phuket", "Tokyo",
  "Bangkok", "Dallas", "Lyon", "Porto", "Toronto",
  "Basel", "Delhi", "Madrid", "Prague", "Tunis",
  "Batumi", "Doha", "Malaga", "Riyadh", "Valencia",
  "Beirut", "Dubai", "Malta", "Rotterdam", "Venice",
  "Belgrade", "Dublin", "Manchester", "Salzburg", "Vienna",
  "Berlin", "Hamburg", "Melbourne", "Santiago", "Zagreb",
  "Bilbao", "Havana", "Miami", "Shanghai", "Zurich"
];

let state = {
  idx: 0,
  awaiting: false,
  running: false,
  currentCity: null,
  correct: 0,
  wrong: 0, // toplam yanlış tıklama
  wrongForThisCity: 0,
  firstTryCorrect: 0,
  cityToButton: new Map(),
  lastWrongButton: null,
  voices: []
};

const settingsScreen = document.getElementById("settingsScreen");
const gameScreen = document.getElementById("gameScreen");
const resultScreen = document.getElementById("resultScreen");

const progress = document.getElementById("progress");
const promptEl = document.getElementById("prompt");
const statusEl = document.getElementById("status");
const cityGrid = document.getElementById("cityGrid");

const useVoice = document.getElementById("useVoice");
const voiceSelect = document.getElementById("voiceSelect");
const speechRate = document.getElementById("speechRate");
const speechPitch = document.getElementById("speechPitch");
const gapAfterAnswerMs = document.getElementById("gapAfterAnswerMs");
const repeatOnWrong = document.getElementById("repeatOnWrong");

const scoreText = document.getElementById("scoreText");
const accuracyText = document.getElementById("accuracyText");

function populateVoices() {
  if (!("speechSynthesis" in window)) return;
  const voices = speechSynthesis.getVoices() || [];
  state.voices = voices;

  const selected = voiceSelect.value;
  const currentVal = selected && selected !== "auto" ? selected : null;

  const options = ["<option value='auto'>Otomatik ses</option>"];
  const seen = new Set();
  for (const v of voices) {
    const key = `${v.name}::${v.lang}`;
    if (seen.has(key)) continue;
    seen.add(key);
    options.push(`<option value="${key}">${v.name} (${v.lang})</option>`);
  }

  voiceSelect.innerHTML = options.join("");

  // Eğer daha önce seçilen ses hâlâ varsa onu geri yükle
  if (currentVal) {
    const exists = Array.from(voiceSelect.options).some(o => o.value === currentVal);
    if (exists) voiceSelect.value = currentVal;
    return;
  }

  // Kullanıcı aksanı tercihi için varsayılanı İngilizce (en-*) yap.
  // (Sesler tarayıcıya göre değiştiği için en iyi eşleşmeyi otomatik seçiyoruz.)
  const preferredLangs = ["en-US", "en-GB", "en-AU", "en-CA", "en-IN", "en"];
  let preferred = null;
  for (const lang of preferredLangs) {
    if (lang === "en") {
      preferred = voices.find(v => (v.lang || "").toLowerCase().startsWith("en"));
      break;
    }
    preferred = voices.find(v => (v.lang || "").toLowerCase() === lang.toLowerCase());
    if (preferred) break;
  }

  if (preferred) {
    const key = `${preferred.name}::${preferred.lang}`;
    const exists = Array.from(voiceSelect.options).some(o => o.value === key);
    if (exists) voiceSelect.value = key;
  }
}

function speak(text) {
  if (!useVoice.checked) return Promise.resolve();
  if (!("speechSynthesis" in window)) return Promise.resolve();

  // Önceki konuşmayı iptal et; böylece hızlı tıklamada üst üste binmez.
  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = Math.max(0.5, Math.min(1.5, parseFloat(speechRate.value) || 1.0));
  utter.pitch = Math.max(0.0, Math.min(2.0, parseFloat(speechPitch.value) || 1.0));
  utter.volume = 1;

  utter.lang = "en-US";
  if (voiceSelect.value && voiceSelect.value !== "auto") {
    const [name, lang] = voiceSelect.value.split("::");
    const chosen = state.voices.find(v => v.name === name && v.lang === lang);
    if (chosen) {
      utter.voice = chosen;
      utter.lang = chosen.lang || utter.lang;
    }
  }

  return new Promise(resolve => {
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    speechSynthesis.speak(utter);
  });
}

function buildGrid() {
  cityGrid.innerHTML = "";
  state.cityToButton = new Map();

  for (const city of CITIES) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cityBtn";
    btn.textContent = city;
    btn.dataset.city = city;
    cityGrid.appendChild(btn);
    state.cityToButton.set(city, btn);
  }
}

function clearWrongHighlights() {
  for (const btn of cityGrid.querySelectorAll(".cityBtn.wrong")) {
    btn.classList.remove("wrong");
  }
  state.lastWrongButton = null;
}

function updateProgress() {
  progress.textContent = `${state.idx + 1} / ${CITIES.length}`;
}

async function speakCurrentCity() {
  if (!state.currentCity) return;
  promptEl.textContent = "Şimdi dinle, sonra gridden seç:";
  statusEl.textContent = "";
  await speak(state.currentCity);
}

function nextQuestion() {
  if (!state.running) return;

  if (state.idx >= CITIES.length) {
    endGame();
    return;
  }

  state.currentCity = CITIES[state.idx];
  state.awaiting = true;
  state.wrongForThisCity = 0;

  clearWrongHighlights();
  updateProgress();

  speakCurrentCity();
}

function handleCityClick(city) {
  if (!state.running || !state.awaiting) return;

  const btn = state.cityToButton.get(city);
  if (!btn) return;

  if (city === state.currentCity) {
    state.awaiting = false;
    state.correct++;

    if (state.wrongForThisCity === 0) state.firstTryCorrect++;

    btn.classList.remove("wrong");
    btn.classList.add("correct");
    statusEl.textContent = "Doğru!";

    const gap = parseInt(gapAfterAnswerMs.value) || 0;
    setTimeout(() => {
      state.idx++;
      nextQuestion();
    }, gap);
  } else {
    state.wrong++;
    state.wrongForThisCity++;

    if (state.lastWrongButton && state.lastWrongButton !== btn) {
      state.lastWrongButton.classList.remove("wrong");
    }
    btn.classList.add("wrong");
    state.lastWrongButton = btn;

    statusEl.textContent = "Yanlış. Tekrar dene.";

    if (repeatOnWrong.checked) {
      // Yanlışta tekrar oku (istersen kapatabilirsin).
      speak(state.currentCity);
    }
  }
}

function endGame() {
  state.running = false;
  state.awaiting = false;
  speechSynthesis?.cancel?.();

  gameScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");

  const total = CITIES.length;
  const firstTryAcc = total ? Math.round((state.firstTryCorrect / total) * 100) : 0;

  scoreText.textContent = `Toplam şehir: ${total} | İlk denemede doğru: ${state.firstTryCorrect} | Yanlış tıklama: ${state.wrong}`;
  accuracyText.textContent = `İlk-klik doğruluk: %${firstTryAcc}`;
  promptEl.textContent = "";
  statusEl.textContent = "";
}

function startGame() {
  state = {
    idx: 0,
    awaiting: false,
    running: true,
    currentCity: null,
    correct: 0,
    wrong: 0,
    wrongForThisCity: 0,
    firstTryCorrect: 0,
    cityToButton: new Map(),
    lastWrongButton: null,
    voices: state.voices
  };

  settingsScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  buildGrid();
  updateProgress();
  promptEl.textContent = "";
  statusEl.textContent = "Dinlemek için hazır mısın?";

  nextQuestion();
}

function resetGame() {
  state.running = false;
  state.awaiting = false;
  speechSynthesis?.cancel?.();

  resultScreen.classList.add("hidden");
  settingsScreen.classList.remove("hidden");
  gameScreen.classList.add("hidden");
}

// Grid tıklamalarını tek listener ile yakala
cityGrid.addEventListener("click", (e) => {
  const btn = e.target.closest(".cityBtn");
  if (!btn) return;
  handleCityClick(btn.dataset.city);
});

// Sesleri otomatik yükle (bazı tarayıcılarda async)
window.addEventListener("load", () => {
  populateVoices();
  if ("speechSynthesis" in window) {
    speechSynthesis.onvoiceschanged = populateVoices;
  }
});

</script>
</body>
</html>
